{% extends "base.html" %}

{% block content %}

<a href="/admin" class="back-link">
    <i class="fa-solid fa-arrow-left"></i>
    Voltar
</a>

<section class="page-title">
    <h1>Editar Conteúdo</h1>
    <p>Revise as informações antes de aprovar o envio</p>
</section>

<form class="send-form" method="POST">

    <div class="form-group">
        <label>Nome do colaborador</label>
        <input type="text" name="autor" value="{{ conteudo[5] }}" required>
    </div>

    <div class="form-group">
        <label>Título</label>
        <input type="text" name="titulo" value="{{ conteudo[1] }}" required>
    </div>

    <div class="form-group">
        <label>Categoria</label>
        <select name="categoria" required>
            <option value="Técnica de plantio" {% if conteudo[3] == "Técnica de plantio" %}selected{% endif %}>Técnica de plantio</option>
            <option value="Colheita" {% if conteudo[3] == "Colheita" %}selected{% endif %}>Colheita</option>
            <option value="Cartilha">Cartilha</option>
            <option value="Receita tradicional" {% if conteudo[3] == "Receita tradicional" %}selected{% endif %}>Receita tradicional</option>
            <option value="História da comunidade" {% if conteudo[3] == "História da comunidade" %}selected{% endif %}>História da comunidade</option>
            <option value="Cuidados com o solo" {% if conteudo[3] == "Cuidados com o solo" %}selected{% endif %}>Cuidados com o solo</option>
            <option value="Outro" {% if conteudo[3] == "Outro" %}selected{% endif %}>Outro</option>
        </select>
    </div>

    <div class="form-group">
        <label>Tipo</label>
        <select name="tipo" required>
            <option value="Texto" {% if conteudo[4] == "Texto" %}selected{% endif %}>Texto</option>
            <option value="Áudio" {% if conteudo[4] == "Áudio" %}selected{% endif %}>Áudio</option>
            <option value="Vídeo" {% if conteudo[4] == "Vídeo" %}selected{% endif %}>Vídeo</option>
            <option value="Foto" {% if conteudo[4] == "Foto" %}selected{% endif %}>Foto</option>
        </select>
    </div>

    <div class="form-group">
        <label>Descrição</label>
        <textarea name="descricao" rows="7" required>{{ conteudo[2] }}</textarea>
    </div>

    <button type="submit" class="send-button">
        Salvar alterações
    </button>

</form>

{% endblock %}
